name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: node_modules/.bin/tsx scripts/e2e.ts

      - run: pnpm -F @ork/example shell

      - run: pnpm -F @ork/example tools

      - run: pnpm -F @ork/example workspaces
